{% extends "base.html" %}
{% block nav_add %}active{% endblock %}
{% block content %}
<div style="margin-bottom: 24px;">
  <a href="/" style="color: var(--muted); text-decoration: none; font-size: 13px;">← Retour à la liste</a>
  <h1 class="page-title" style="margin-top: 6px;">Ajouter une entrée</h1>
  <p class="page-sub">Saisie manuelle d'une poétesse ou écrivaine médiévale.</p>
</div>

<form method="post" action="/add">
  <div class="card">
    <div class="form-group">
      <label>Auteure *</label>
      <input type="text" name="author" required placeholder="Nom de l'auteure">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
      <div class="form-group">
        <label>Date</label>
        <input type="text" name="date" placeholder="ex: XIIe siècle, 1150–1215">
      </div>
      <div class="form-group">
        <label>Source</label>
        <input type="text" name="source_name" placeholder="ex: Wikipedia, manuscrit BnF">
      </div>
    </div>
    <div class="form-group">
      <label>Lien source</label>
      <input type="text" name="source_link" placeholder="https://...">
    </div>
    <hr class="divider">
    <div class="form-group">
      <label>Texte original / extrait biographique</label>
      <textarea name="original_text" placeholder="Extrait ou biographie..."></textarea>
    </div>
  </div>
  <div class="flex" style="justify-content: flex-end; margin-top: 8px;">
    <a href="/" class="btn btn-secondary">Annuler</a>
    <button type="submit" class="btn btn-success">✓ Ajouter et valider</button>
  </div>
</form>
{% endblock %}
